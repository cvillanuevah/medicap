<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Soberana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-login-page">
  <div class="admin-login">
    <div class="admin-login__card">
      <div class="admin-login__header">
        <span class="admin-login__logo">Soberana</span>
        <p>Panel de Administraci&oacute;n</p>
      </div>
      <form id="adminLoginForm">
        <div class="form-group">
          <label for="email">Correo electr&oacute;nico</label>
          <input type="email" id="email" required placeholder="admin@soberana.cl" class="admin-input">
        </div>
        <div class="form-group">
          <label for="password">Contrase&ntilde;a</label>
          <input type="password" id="password" required placeholder="Contrase&ntilde;a" class="admin-input">
        </div>
        <div id="loginError" class="admin-error" style="display:none;"></div>
        <button type="submit" class="admin-btn admin-btn--primary admin-btn--full">
          <i class="fas fa-sign-in-alt"></i> Iniciar Sesi&oacute;n
        </button>
      </form>
      <a href="../index.html" class="admin-login__back"><i class="fas fa-arrow-left"></i> Volver a la tienda</a>
    </div>
  </div>
  <script src="../js/auth.js"></script>
  <script>
    if (Auth.isAdmin()) {
      window.location.href = 'index.html';
    }

    document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var email = document.getElementById('email').value;
      var password = document.getElementById('password').value;
      var errorEl = document.getElementById('loginError');
      errorEl.style.display = 'none';

      var result = Auth.login(email, password);
      if (!result.ok) {
        errorEl.textContent = result.error;
        errorEl.style.display = 'block';
        return;
      }
      if (result.user.role !== 'admin') {
        Auth.logout();
        errorEl.textContent = 'No tienes permisos de administrador.';
        errorEl.style.display = 'block';
        return;
      }
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
